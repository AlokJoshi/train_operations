<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Operations</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

</head>

<body>
  <canvas id="canvas_tracks"></canvas>
  <canvas id="canvas"></canvas>
  <canvas id="canvas_results" style="position:fixed"></canvas>
  <canvas id="canvas_temp"></canvas>
  <div id="controls">
    <p>Start Pause Game or Individual Trains</p>
    <div id="buttonGroup1" style="display:flex; flex-direction:row; gap:10px">
      <i class="fas fa-play" id="startPauseBtn" style="cursor:pointer"></i>
      <div id="train1" style="display:none;flex-direction:row; gap:10px">
        <span id="lblTrain1">T1</span>
        <i class="fas fa-pause" title="Pause Train" id="pauseTrain1" style="cursor:pointer" onclick="startStopTrain(1)"></i>
        <i class="fas fa-arrow-up" title= "Speed Up Train" id="speedUpTrain1" style="cursor:pointer" onclick="speedtrain('up',1)"></i>
        <i class="fas fa-arrow-down" title= "Slow Down Train" id="slowDownTrain1" style="cursor:pointer" onclick="speedtrain('down',1)"></i>
        <i class="fas fa-times" title= "Remove Train" id="removeTrain1" style="cursor:pointer" onclick="removetrain(1)"></i>
        <div style="width:20px; height:20px; background-color:red;">

          <div id="health1" class="health"></div>
        </div>
      </div>
      <div id="train2" style="display:none;flex-direction:row; gap:10px">

        <i class="fas fa-times" title= "Remove Train" id="removeTrain2" style="cursor:pointer" onclick="removetrain(2)"></i>
        <div style="width:20px; height:20px; background-color:red;">

        </div>
      </div>

    <div id="buttonGroup2" style="display:flex; flex-direction:row; gap:10px">
      <p>Design a new track and train to run on it</p>
      <i class="fas fa-play" title="Start Track" id="startTrack" onclick="starttrack()"></i>
      <i class="fas fa-times" title="Cancel Track" id="cancelTrack" style="display:none" onclick="canceltrack()"></i>
      <input type="text" title="Train Name" id="trainname" placeholder="Train Name">
      <input type="number" title="# of Coaches" id="numcoaches" value="1" placeholder="# of Coaches">
      <input type="number" title="Speed" id="speed" value="10" placeholder="1-19" min="1" max="19">
      <i class="fas fa-flag-checkered" title="Start Train" id="starttrain" onclick="newtrain()"></i>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>

</html>
