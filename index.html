<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Operations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas_tracks"></canvas>
  <canvas id="canvas"></canvas>
  <canvas id="canvas_temp"></canvas>
  <div id="controls">
    <div id="buttonGroup1">
      <p>Start Pause Game or Individual Trains</p>
      <button id="startPauseBtn">Start Game</button>
      <button id="butTrain1">1</button>
      <button id="butTrain2">2</button>
      <button id="butTrain3">3</button>
      <button id="butTrain4">4</button>
      <button id="butTrain5">5</button>
      <button id="butTrain6">6</button>
      <button id="butTrain7">7</button>
      <button id="butTrain8">8</button>
      <button id="butTrain9">9</button>
    </div>
    <div id="buttonGroup2">
      <p>Design a new track and train to run on it</p>
      <button id="startTrack">Start Track</button>
      <button id="endTrack">End Track</button>
    </div>
  </div>
<script type="module" src="script.js"></script>  
</body>
</html>
