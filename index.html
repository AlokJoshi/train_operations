        </div>
        <div>
          <label for="trainname">Train Name:</label>

        </div>
        <div>
          <label for="numcoaches"># of Coaches:</label>
          <input type="number" title="# of Coaches" id="numcoaches" min="2" max="15" value="7" placeholder="# of Coaches">
        </div>
        <div>
          <label for="speed">Speed:</label>
          <input type="number" title="Speed" id="speed" value="5" placeholder="1-19" min="1" max="19">
        </div>
        <div>
          <label for="starttrain">Flag off the new Train:</label>
          <i class="fas fa-flag-checkered" title="Start Train" id="starttrain" onclick="newtrain()"></i>
        </div>
        <div>
